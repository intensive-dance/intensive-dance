name: Copilot CLI test

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt to send to GitHub Copilot CLI"
        required: true
        default: "Say hello and tell me a fun fact about ballet."

permissions:
  contents: read

jobs:
  ask-copilot:
    runs-on: ubuntu-latest
    steps:
      - uses: austenstone/copilot-cli@main
        id: copilot
        with:
          prompt: ${{ inputs.prompt }}
          copilot-token: ${{ secrets.COPILOT_CLI_TOKEN }}
          silent: true
          share: true

      - name: Print the response
        run: |
          echo "::group::Copilot response"
          cat "${{ steps.copilot.outputs.session-path }}"
          echo "::endgroup::"
