name: Copilot CLI test

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt to send to GitHub Copilot CLI"
        required: true
        default: "Say hello and tell me a fun fact about ballet."

permissions:
  contents: read

jobs:
  ask-copilot:
    runs-on: ubuntu-latest
    steps:
      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: copilot -p "${{ inputs.prompt }}" --no-color
