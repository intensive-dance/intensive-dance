name: scrape

on:
  schedule:
    - cron: "0 4 * * *" # daily, 04:00 UTC — intensives change slowly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Scrape
        env:
          FETCH_PROXY_URL: ${{ secrets.FETCH_PROXY_URL }}
          FETCH_PROXY_TOKEN: ${{ secrets.FETCH_PROXY_TOKEN }}
        run: uv run python -m intensive_dance.run

      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "data: scheduled scrape $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no data changes"
          fi
