name: scrape

on:
  schedule:
    - cron: "0 * * * *" # hourly — rotate through the 10 least-recently-attempted scrapers
  workflow_dispatch:

permissions:
  contents: write

# Never let two scrapes run at once: the commit job pushes to main, so overlapping
# runs would race the push. Queue a new trigger behind the running one rather than
# cancelling it (don't interrupt an in-flight commit/push).
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  select:
    runs-on: ubuntu-latest
    outputs:
      slugs: ${{ steps.pick.outputs.slugs }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      # The 10 providers whose source.attemptedAt is oldest (never-attempted first).
      - id: pick
        run: echo "slugs=$(uv run python -m intensive_dance.rotation 10)" >> "$GITHUB_OUTPUT"

  scrape:
    needs: select
    runs-on: ubuntu-latest
    # fail-fast off + continue-on-error: one flaky site must not abort the others,
    # and the commit job below must still run.
    strategy:
      fail-fast: false
      matrix:
        slug: ${{ fromJson(needs.select.outputs.slugs) }}
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Scrape ${{ matrix.slug }}
        id: scrape
        continue-on-error: true
        env:
          FETCH_PROXY_URL: ${{ secrets.FETCH_PROXY_URL }}
          FETCH_PROXY_TOKEN: ${{ secrets.FETCH_PROXY_TOKEN }}
        run: uv run python -m intensive_dance.run --touch ${{ matrix.slug }}

      # --touch stamps attemptedAt even on failure, so there's always a file to upload.
      - name: Upload data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: data-${{ matrix.slug }}
          path: data/${{ matrix.slug }}.json
          if-no-files-found: ignore
          retention-days: 1

      # continue-on-error swallows a crashed scraper so it never blocks the others;
      # a marker artifact lets the report job below hand the crash to Copilot.
      - name: Mark scrape failure
        if: steps.scrape.outcome == 'failure'
        run: |
          mkdir -p failures
          echo "${{ matrix.slug }}" > "failures/${{ matrix.slug }}.txt"

      - name: Upload failure marker
        if: steps.scrape.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: fail-${{ matrix.slug }}
          path: failures/${{ matrix.slug }}.txt
          retention-days: 1

  commit:
    needs: [select, scrape]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # upload-artifact@v4 strips the common leading dir, so each artifact's root
      # is the bare <slug>.json — download into data/ to land them at data/<slug>.json
      # (path: . would drop them at the repo root, where the commit check never looks).
      - name: Download scraped data
        uses: actions/download-artifact@v8
        with:
          pattern: data-*
          path: data
          merge-multiple: true

      # Every selected provider's attemptedAt is bumped, so there is always a diff
      # to commit — a flaky site never blocks the others' fresh data.
      - name: Commit changed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "data: hourly scrape $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "no data changes"
          fi

  # Self-healing: a crashed scraper leg (fail-* marker) or a hard infra failure
  # gets distilled into a single open issue and handed to the Copilot coding agent.
  # No markers and no failure → report_failure no-ops, so this is cheap on a clean run.
  report:
    needs: [select, scrape, commit]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read # gh run view --log, for the failure digest
    steps:
      - uses: actions/checkout@v6

      - name: Download failure markers
        continue-on-error: true # no markers on a clean run is fine, not an error
        uses: actions/download-artifact@v8
        with:
          pattern: fail-*
          path: failures
          merge-multiple: true

      - name: Report failures to Copilot
        env:
          # Issue ops + log read run on the default GITHUB_TOKEN (this job grants it
          # issues:write + actions:read); only the Copilot assignment needs a user
          # PAT with Copilot enabled, read from COPILOT_TOKEN — the default token
          # cannot assign the agent. Assignment is best-effort, so a PAT that lacks
          # the extra scopes (or is absent) just skips it; the issue still lands.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT || secrets.COPILOT_CLI_TOKEN || secrets.COPILOT_ASSIGN_TOKEN }}
        run: PYTHONPATH=src python3 -m intensive_dance.report_failure
