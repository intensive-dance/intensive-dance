name: AI proxy test (Python)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt to send to the AI proxy"
        required: true
        default: "Reply with exactly one short sentence: a fun fact about ballet."
      model:
        description: "Model id from the catalog (GET <proxy>/models)"
        required: true
        default: "gemini-2.5-flash"

permissions:
  contents: read

jobs:
  ask-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install openai

      - name: Ask the model
        env:
          AI_PROXY_URL: ${{ secrets.AI_PROXY_URL }}
          PROMPT: ${{ inputs.prompt }}
          MODEL: ${{ inputs.model }}
        run: |
          python - <<'PY'
          import os
          from openai import OpenAI

          # Auth is the token baked into AI_PROXY_URL's path, so api_key is unused.
          client = OpenAI(base_url=os.environ["AI_PROXY_URL"], api_key="unused")
          resp = client.chat.completions.create(
              model=os.environ["MODEL"],
              messages=[{"role": "user", "content": os.environ["PROMPT"]}],
          )
          print(resp.choices[0].message.content)
          PY
