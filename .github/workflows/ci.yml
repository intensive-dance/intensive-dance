name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Validate committed data
        run: uv run python -m intensive_dance.validate
