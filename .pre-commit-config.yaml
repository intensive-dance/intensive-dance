# Enable once per clone:  uv run pre-commit install
#
# Hooks call the project's own ruff/ty (via uv) rather than separately pinned
# mirrors, so formatting/linting/type-checking on commit matches `uv run` locally
# and in CI exactly — one tool version each, no drift.
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types_or: [python, pyi]
        # Type errors cross files (editing B can break A), so check the whole
        # project rather than just the staged paths.
        pass_filenames: false
        require_serial: true
