# Enable once per clone:  uv run pre-commit install
#
# Hooks call the project's own ruff (via uv) rather than a separately pinned
# mirror, so formatting/linting on commit matches `uv run ruff` locally and in
# CI exactly — one ruff version, no drift.
repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
